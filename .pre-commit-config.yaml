repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: shfmt
        name: Run shfmt
        language: system
        entry: "bash -lc './scripts/shfmt.bash || { echo \"shfmt diff detected. Run: ./scripts/shfmt.bash -w\" >&2; exit 1; }'"
        pass_filenames: false
        stages: [pre-commit]
      - id: shellcheck
        name: Run shellcheck
        language: system
        entry: ./scripts/shellcheck.bash
        pass_filenames: false
        stages: [pre-commit]
      - id: brew-sync-report-darwin
        name: Check brew drift
        language: system
        entry: bash -lc 'if [[ "$(uname -s)" == "Darwin" ]]; then ./scripts/brew-sync-report.bash --strict; fi'
        pass_filenames: false
        stages: [pre-commit]
